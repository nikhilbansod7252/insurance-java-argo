apiVersion: apps/v1
kind: Deployment
metadata:
  name: insurance-java
spec:
  replicas: 2
  selector:
    matchLabels:
      app: insurance-java
  template:
    metadata:
      labels:
        app: insurance-java
    spec:
      containers:
        - name: insurance-java
          image: IMAGE_NAME
          ports:
            - containerPort: 8080
